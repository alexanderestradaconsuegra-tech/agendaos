<!doctype html>
<html lang="es">
<head>

  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<body>
  <div id="root"></div>
  <script type="text/babel">
    const WHATSAPP_URL = "https://wa.me/56927446802?text=Hola%2C%20quiero%20informaci%C3%B3n%20sobre%20AgendaOS";
    const SYSTEM_DEMO_URL = "https://app.agendaos.pro";

    const plans = [
      { name: "Básico", label: "Landing premium", price: "$145.000", previousPrice: "$180.000", subtitle: "Pago único setup", description: "Para negocios que quieren una presencia moderna, clara y lista para recibir consultas.", items: ["Landing premium personalizada", "Diseño responsive", "Sección de servicios", "Botón directo a WhatsApp", "Galería visual", "Formulario o CTA de contacto"] },
      { name: "Business", label: "Landing + agenda", price: "$190.000", previousPrice: "$250.000", subtitle: "Pago único setup", description: "Para negocios que quieren recibir reservas desde la web y organizar mejor sus horarios.", items: ["Todo lo del plan Básico", "Agenda online integrada", "Selección de servicio y horario", "Registro de clientes", "Control de servicios y precios", "Confirmación de reserva"] },
      { name: "Elite", label: "Automatización completa", price: "$390.000", previousPrice: "$560.000", subtitle: "Setup + $65.000 mensual", description: "Para negocios que quieren un sistema completo: página, WhatsApp, agenda, clientes, servicios, profesionales y automatización conectados en un solo lugar.", items: ["Todo lo del plan Business", "sofIA integrada", "WhatsApp automático", "Sistema completo todo en uno", "Panel de control del negocio", "Página + WhatsApp + agenda integrados", "Servicios, clientes y profesionales", "Soporte, mejoras y mantenimiento"] }
    ];

    const benefits = [
      { title: "Agenda automática", text: "Tus clientes pueden elegir servicio, horario y dejar sus datos sin esperar respuesta manual." },
      { title: "WhatsApp integrado", text: "Facilita consultas, confirmaciones y contacto directo desde botones y flujos preparados para vender." },
      { title: "Control del negocio", text: "Organiza servicios, profesionales, horarios, clientes y reservas desde una experiencia simple." },
      { title: "Imagen premium", text: "Cada negocio recibe una presencia visual moderna que aumenta confianza y mejora la percepción de marca." }
    ];

    const featureList = ["Reservas online 24/7", "Calendario de disponibilidad", "Gestión de clientes", "Control de servicios y precios", "Sistema todo en uno para gestión", "Landing personalizada por negocio", "Diseño responsive premium", "Botones directos a WhatsApp", "Asistente sofIA para atención"];

    const demos = [
      { title: "Bellas", category: "Beauty Studio", image: "https://images.unsplash.com/photo-1632345031435-8727f6897d53?q=80&w=1600&auto=format&fit=crop" },
      { title: "Luxury Barber", category: "Barber Studio", image: "https://images.unsplash.com/photo-1622286342621-4bd786c2447c?q=80&w=1600&auto=format&fit=crop" },
      { title: "Aura Spa", category: "Spa & Wellness", image: "https://images.unsplash.com/photo-1515377905703-c4788e51af15?q=80&w=1600&auto=format&fit=crop" }
    ];

    const heroStats = [
      { label: "Reservas confirmadas", value: "+320", description: "Clientes agendando automáticamente cada mes" },
      { label: "Atención automática", value: "24/7", description: "Respuestas incluso fuera del horario laboral" },
      { label: "Más conversión", value: "+82%", description: "Más clientes pasando de consulta a reserva" }
    ];

    const sofiaMessages = [
      { role: "assistant", text: "Hola ✨ Bienvenida. Puedo ayudarte por texto, audio o imagen. ¿Qué servicio deseas reservar hoy?" },
      { role: "user", text: "Quiero reservar manicure permanente para mañana 💅" },
      { role: "assistant", text: "Perfecto. Revisé la agenda y tengo disponibilidad a las 15:00 y 17:30. También puedo enviarte el catálogo de diseños." },
      { role: "user", text: "Me gustaría a las 17:30. ¿Recuerdas el diseño nude que pedí la vez pasada?" },
      { role: "assistant", text: "Sí, lo recuerdo. Reservo manicure permanente nude a las 17:30 y envío la confirmación por WhatsApp." }
    ];

    function BrandLogo({ className = "", dot = true }) {
      return <span className={className}>Agenda<span className="text-fuchsia-400">OS</span>{dot && <span className="ml-1 inline-block h-2 w-2 rounded-full bg-emerald-400 align-middle shadow-[0_0_12px_rgba(52,211,153,.8)]" />}</span>;
    }

    function SofiaName({ className = "" }) {
      return <span className={className}>sof<span className="text-fuchsia-400">IA</span></span>;
    }

    function Button({ children, variant = "primary", href = WHATSAPP_URL, external = true }) {
      const styles = { primary: "bg-white text-stone-950 hover:bg-stone-200", dark: "bg-fuchsia-500 text-white hover:bg-fuchsia-400", ghost: "border border-white/10 bg-white/5 text-white hover:bg-white/10" };
      return <a href={href} target={external ? "_blank" : undefined} rel={external ? "noreferrer" : undefined} className={`inline-flex w-full items-center justify-center rounded-full px-5 py-3 text-center text-sm font-black transition sm:w-auto ${styles[variant] || styles.primary}`}>{children}</a>;
    }

    function DemoCard({ title, category, image }) {
      return <div className="group overflow-hidden rounded-[2rem] border border-white/10 bg-[#111111] shadow-2xl transition hover:-translate-y-2 hover:border-fuchsia-500/40"><div className="relative h-72 overflow-hidden"><img src={image} alt={title} className="h-full w-full object-cover transition duration-700 group-hover:scale-105" /><div className="absolute inset-0 bg-gradient-to-t from-black via-black/20 to-transparent" /><div className="absolute bottom-0 left-0 right-0 p-4 sm:p-6"><div className="rounded-[1.7rem] border border-white/10 bg-black/40 p-4 backdrop-blur-xl sm:p-5"><p className="text-xs font-black uppercase tracking-[0.28em] text-fuchsia-300">{category}</p><h3 className="mt-2 text-2xl font-black text-white">{title}</h3><a href={WHATSAPP_URL} target="_blank" rel="noreferrer" className="mt-5 inline-flex rounded-full bg-white px-5 py-3 text-sm font-black text-stone-950 transition hover:bg-fuchsia-200">Ver demo</a></div></div></div></div>;
    }

    function Benefit({ title, text }) {
      return <div className="rounded-[2rem] border border-white/10 bg-white/[0.03] p-6 backdrop-blur-xl transition hover:border-fuchsia-500/30 hover:bg-white/[0.05]"><div className="mb-5 h-2 w-16 rounded-full bg-gradient-to-r from-fuchsia-500 to-pink-400" /><h3 className="text-2xl font-black text-white">{title}</h3><p className="mt-4 text-sm font-medium leading-7 text-white/60">{text}</p></div>;
    }

    function ChatBubble({ role, text }) {
      const isUser = role === "user";
      return <div className={`flex ${isUser ? "justify-end" : "justify-start"}`}><div className={`max-w-sm rounded-[2rem] px-5 py-4 text-sm leading-7 ${isUser ? "bg-fuchsia-500 font-bold text-white shadow-lg shadow-fuchsia-500/20" : "bg-white/5 font-medium text-white/80"}`}>{text}</div></div>;
    }

    function PlanCard({ plan, index }) {
      return <div className={`relative rounded-[2.5rem] border p-6 backdrop-blur-xl sm:p-8 ${index === 1 ? "border-fuchsia-500/40 bg-fuchsia-500/[0.08] shadow-[0_0_50px_rgba(217,70,239,.18)]" : "border-white/10 bg-white/[0.03]"}`}>
        {index === 1 && <div className="absolute right-6 top-6 rounded-full bg-fuchsia-500 px-4 py-2 text-xs font-black text-white">Oferta este mes</div>}
        <p className="text-sm font-black uppercase tracking-[0.22em] text-fuchsia-300">{plan.name}</p><h3 className="mt-3 text-2xl font-black text-white">{plan.label}</h3>
        <div className="mt-6 flex flex-wrap items-end gap-3">{plan.previousPrice && <span className="text-xl font-black text-white/25 line-through sm:text-2xl">{plan.previousPrice}</span>}<p className="text-5xl font-black leading-none text-white sm:text-6xl">{plan.price}</p></div>
        <p className="mt-3 text-sm font-semibold text-white/45">{plan.subtitle}</p><p className="mt-6 text-sm font-medium leading-7 text-white/55">{plan.description}</p>
        <div className="mt-8 space-y-4">{plan.items.map((item) => <div key={item} className="rounded-2xl border border-white/10 bg-black/20 px-4 py-3 text-sm font-semibold text-white/75">✨ {item}</div>)}</div>
        <a href={WHATSAPP_URL} target="_blank" rel="noreferrer" className="mt-8 inline-flex w-full items-center justify-center rounded-full bg-white px-6 py-4 text-sm font-black text-stone-950 hover:bg-fuchsia-200">Solicitar implementación</a>
      </div>;
    }

    function AgendaOSLanding() {
      return <main className="relative min-h-screen overflow-hidden bg-[#050505] text-white antialiased">
        <div className="absolute inset-0 -z-10 bg-[radial-gradient(circle_at_15%_20%,rgba(217,70,239,.18),transparent_25%),radial-gradient(circle_at_80%_10%,rgba(244,114,182,.12),transparent_24%),radial-gradient(circle_at_50%_80%,rgba(192,132,252,.12),transparent_28%)]" />
        <header className="sticky top-0 z-50 border-b border-white/5 bg-black/40 backdrop-blur-2xl"><div className="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-4 sm:px-6 sm:py-5"><p className="text-2xl font-black tracking-tight"><BrandLogo /></p><nav className="hidden items-center gap-8 text-sm font-semibold text-white/60 lg:flex"><a href="#demos" className="transition hover:text-emerald-400">Demos</a><a href="#beneficios" className="transition hover:text-emerald-400">Beneficios</a><a href="#sofia" className="transition hover:text-emerald-400">sof<span className="text-fuchsia-400">IA</span></a><a href="#planes" className="transition hover:text-emerald-400">Planes</a></nav><div className="hidden gap-3 sm:flex"><Button variant="ghost" href={SYSTEM_DEMO_URL}>Ver sistema</Button><Button variant="dark" href={WHATSAPP_URL}>Solicitar demo</Button></div></div></header>
        <section className="relative px-4 pb-16 pt-12 sm:px-6 lg:pb-32 lg:pt-24"><div className="mx-auto grid max-w-7xl items-center gap-16 lg:grid-cols-[1.05fr_.95fr]"><div><div className="mb-8 inline-flex items-center gap-3 rounded-full border border-fuchsia-500/20 bg-fuchsia-500/10 px-5 py-3 text-sm font-black text-fuchsia-200 backdrop-blur-xl">Plataforma premium para reservas inteligentes</div><h1 className="max-w-5xl text-5xl font-black leading-none tracking-tight sm:text-7xl lg:text-8xl">Convierte conversaciones en reservas <span className="text-fuchsia-400">automáticas</span>.</h1><p className="mt-8 max-w-2xl text-lg font-medium leading-9 text-white/60"><BrandLogo /> ayuda a negocios de belleza, barberías, spa, estética y servicios profesionales a recibir reservas, organizar horarios y atender clientes desde una experiencia moderna, automática y lista para vender más.</p><div className="mt-10 flex flex-col gap-4 sm:flex-row"><Button variant="dark" href={WHATSAPP_URL}>Solicitar demo</Button><Button variant="ghost" href={SYSTEM_DEMO_URL}>Ver sistema</Button></div><div className="mt-14 grid gap-4 sm:grid-cols-3">{["Reservas automáticas", "Clientes 24/7", "Agenda + WhatsApp"].map((item) => <div key={item} className="rounded-3xl border border-white/10 bg-white/[0.03] p-5 backdrop-blur-xl"><p className="text-sm font-black text-white">{item}</p></div>)}</div></div><div className="relative"><div className="absolute -inset-10 rounded-[3rem] bg-gradient-to-br from-fuchsia-500/30 via-purple-500/10 to-pink-500/20 blur-3xl" /><div className="relative overflow-hidden rounded-[2.8rem] border border-white/10 bg-[#0c0c0c] shadow-[0_0_80px_rgba(217,70,239,.18)]"><img src="https://images.unsplash.com/photo-1519823551278-64ac92734fb1?q=80&w=1800&auto=format&fit=crop" alt="Experiencia spa y bienestar conectada a AgendaOS" className="h-[620px] w-full object-cover opacity-60 sm:h-[700px] lg:h-[760px]" /><div className="absolute inset-0 bg-gradient-to-b from-black/20 via-black/50 to-black" /><div className="absolute inset-0 flex flex-col justify-between p-5 sm:p-7"><div className="flex items-center justify-between gap-3"><div className="rounded-full border border-white/10 bg-white/5 px-4 py-2 text-xs font-black uppercase tracking-[0.18em] text-fuchsia-200 backdrop-blur-xl"><BrandLogo /> Dashboard</div><div className="rounded-full border border-white/10 bg-emerald-500/15 px-4 py-2 text-xs font-black text-emerald-300">Online</div></div><div className="space-y-4"><div className="rounded-[2.2rem] border border-white/10 bg-black/55 p-5 shadow-2xl backdrop-blur-2xl sm:p-6"><div className="flex items-center gap-4"><img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=300&auto=format&fit=crop" alt="sofIA" className="h-16 w-16 rounded-full border-2 border-fuchsia-400 object-cover shadow-lg shadow-fuchsia-500/30" /><div><p className="text-2xl font-black text-white"><SofiaName /></p><p className="text-sm font-semibold text-fuchsia-200/70">Asistente inteligente de reservas y atención</p></div></div><div className="mt-6 space-y-4"><div className="rounded-2xl border border-emerald-500/20 bg-emerald-500/10 p-4 backdrop-blur-xl"><p className="text-xs font-black uppercase tracking-[0.2em] text-emerald-300">Reserva confirmada</p><p className="mt-3 text-sm font-medium leading-7 text-white/80">✨ Camila reservó masaje relajante + spa facial para hoy a las 18:30.</p></div><div className="rounded-2xl border border-white/10 bg-white/[0.04] p-4"><div className="flex items-center justify-between gap-3"><div><p className="text-xs font-black uppercase tracking-[0.18em] text-white/40">Conversaciones activas</p><p className="mt-2 text-4xl font-black text-white">126</p></div><div className="rounded-full bg-fuchsia-500/20 px-4 py-2 text-xs font-black text-fuchsia-300">sofIA online</div></div></div><div className="rounded-2xl border border-white/10 bg-white/[0.04] p-4"><p className="text-xs font-black uppercase tracking-[0.18em] text-white/40">Clientes recuperados automáticamente</p><p className="mt-2 text-4xl font-black text-white">+94</p><p className="mt-2 text-sm font-medium text-white/55">Clientes que volvieron a reservar gracias al seguimiento automático.</p></div></div></div><div className="grid gap-3 sm:grid-cols-3">{heroStats.map((stat) => <div key={stat.label} className="flex min-h-[145px] flex-col justify-start overflow-hidden rounded-[1.35rem] border border-white/10 bg-white/[0.04] p-3 backdrop-blur-xl sm:min-h-[155px] sm:p-4 lg:min-h-[165px]"><p className="text-[9px] font-black uppercase tracking-[0.12em] text-white/45 sm:text-[10px] lg:text-[11px]">{stat.label}</p><p className="mt-2 break-words text-xl font-black leading-none text-white sm:text-2xl lg:text-3xl">{stat.value}</p><p className="mt-2 max-w-full break-words text-[10px] font-medium leading-4 text-white/55 sm:text-xs sm:leading-5">{stat.description}</p></div>)}</div></div></div></div></div></div></div></section>
        <section className="px-4 py-16 sm:px-6 lg:py-24" id="demos"><div className="mx-auto max-w-7xl"><div className="mb-12 flex flex-col justify-between gap-6 lg:flex-row lg:items-end"><div><p className="text-sm font-black uppercase tracking-[0.28em] text-fuchsia-300">Demos reales</p><h2 className="mt-5 text-4xl font-black tracking-tight sm:text-5xl">Así se vería tu negocio con Agenda<span className="text-fuchsia-400">OS</span>.</h2></div><p className="max-w-xl text-base font-medium leading-8 text-white/55">Landing pages premium conectadas a un sistema inteligente de reservas, atención automática y gestión de clientes.</p></div><div className="grid gap-6 lg:grid-cols-3">{demos.map((demo) => <DemoCard key={demo.title} {...demo} />)}</div></div></section>
        <section className="px-4 py-16 sm:px-6 lg:py-24" id="beneficios"><div className="mx-auto max-w-7xl"><div className="mb-14 text-center"><p className="text-sm font-black uppercase tracking-[0.28em] text-fuchsia-300">Beneficios</p><h2 className="mt-5 text-4xl font-black tracking-tight sm:text-5xl">Todo lo que necesita un negocio moderno para agendar más.</h2><p className="mx-auto mt-6 max-w-3xl text-lg font-medium leading-9 text-white/55">No es solo una página web. Es una experiencia comercial completa para captar clientes, mostrar servicios, recibir reservas y reducir el tiempo perdido respondiendo mensajes repetidos.</p></div><div className="grid gap-6 md:grid-cols-2 xl:grid-cols-4">{benefits.map((benefit) => <Benefit key={benefit.title} {...benefit} />)}</div><div className="mt-10 grid gap-4 md:grid-cols-2 lg:grid-cols-3">{featureList.map((item) => <div key={item} className="rounded-3xl border border-white/10 bg-white/[0.03] px-5 py-4 text-sm font-bold text-white/75 backdrop-blur-xl">✨ {item}</div>)}</div></div></section>
        <section className="px-4 py-16 sm:px-6 lg:py-24"><div className="mx-auto max-w-7xl rounded-[2rem] border border-white/10 bg-white/[0.03] p-5 backdrop-blur-xl sm:rounded-[3rem] sm:p-8 lg:p-14"><div className="grid gap-10 lg:grid-cols-[.85fr_1.15fr] lg:items-center"><div><p className="text-sm font-black uppercase tracking-[0.28em] text-fuchsia-300">Cómo funciona</p><h2 className="mt-5 text-4xl font-black tracking-tight sm:text-5xl">Página, <span className="text-emerald-400">WhatsApp</span> y sistema trabajando juntos.</h2><p className="mt-6 text-base font-medium leading-8 text-white/55 sm:text-lg sm:leading-9"><BrandLogo /> conecta la web del negocio, la atención por WhatsApp y el sistema interno de gestión para que todo quede organizado en un mismo flujo: consultas, reservas, clientes, profesionales y servicios.</p><div className="mt-8 flex flex-col gap-3 sm:flex-row"><Button variant="dark" href={WHATSAPP_URL}>Solicitar demo</Button><Button variant="ghost" href={SYSTEM_DEMO_URL}>Ver demo del sistema</Button></div></div><div className="grid gap-4 md:grid-cols-3">{[{ step: "01", title: "Web", text: "El cliente conoce servicios, precios y agenda desde la página." }, { step: "02", title: "WhatsApp", text: "La conversación continúa con atención y confirmaciones." }, { step: "03", title: "Sistema", text: "El negocio controla reservas, clientes, servicios y profesionales." }].map((item) => <div key={item.step} className="rounded-[2rem] border border-white/10 bg-black/30 p-5 sm:p-6"><p className="text-sm font-black text-fuchsia-300">{item.step}</p><h3 className="mt-4 text-xl font-black sm:text-2xl">{item.title}</h3><p className="mt-3 text-sm font-medium leading-6 text-white/55">{item.text}</p></div>)}</div></div></div></section>
        <section className="px-4 py-16 sm:px-6 lg:py-24" id="sofia"><div className="mx-auto grid max-w-7xl items-center gap-12 rounded-[2rem] border border-white/10 bg-gradient-to-br from-fuchsia-500/10 via-black to-pink-500/10 p-5 sm:rounded-[3rem] sm:p-8 lg:grid-cols-[.85fr_1.15fr] lg:p-14"><div><p className="text-sm font-black uppercase tracking-[0.28em] text-fuchsia-300"><SofiaName /></p><h2 className="mt-5 text-4xl font-black tracking-tight sm:text-5xl">Mucho más que un chatbot de reservas.</h2><p className="mt-6 text-lg font-medium leading-9 text-white/60"><SofiaName /> responde mensajes de texto, audios e imágenes, recuerda conversaciones anteriores, comparte horarios, servicios y catálogos, ayuda a elegir tratamientos, revisa disponibilidad en tiempo real y acompaña al cliente hasta completar la reserva. Además, se integra directamente con el sistema de agenda para registrar automáticamente cada cita confirmada.</p><div className="mt-10 rounded-[2rem] border border-fuchsia-500/20 bg-fuchsia-500/10 p-6 backdrop-blur-xl"><p className="text-sm font-black uppercase tracking-[0.22em] text-fuchsia-300">Atención automática</p><p className="mt-4 text-base font-medium leading-8 text-white/70">Menos tiempo respondiendo mensajes repetidos y más tiempo atendiendo clientes. <SofiaName /> puede responder incluso fuera del horario laboral.</p></div></div><div className="rounded-[2.5rem] border border-white/10 bg-black/40 p-5 shadow-[0_0_50px_rgba(217,70,239,.12)] backdrop-blur-2xl sm:p-6"><div className="mb-6 flex items-center gap-4 border-b border-white/10 pb-5"><img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=300&auto=format&fit=crop" alt="sofIA" className="h-16 w-16 rounded-full border-2 border-fuchsia-400 object-cover" /><div><p className="text-2xl font-black text-white"><SofiaName /></p><p className="text-sm font-semibold text-emerald-300">Online · Respondiendo reservas</p></div></div><div className="space-y-4">{sofiaMessages.map((message)
